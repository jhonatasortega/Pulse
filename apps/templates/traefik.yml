id: traefik
name: Traefik
description: Modern reverse proxy and load balancer with automatic service discovery, Let's Encrypt SSL, and Docker integration. Supports weighted routing and circuit breakers.
version: "3"
category: tools
icon: ⚖️
webui_port: 8080
webui_path: /dashboard/

docker:
  image: traefik:v3.0
  ports:
    - "80:80"
    - "443:443"
    - "8080:8080"
  volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - ./data/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    - ./data/traefik/acme:/etc/traefik/acme
  env:
    - TRAEFIK_API_DASHBOARD=true
    - TRAEFIK_API_INSECURE=true
    - TRAEFIK_PROVIDERS_DOCKER=true
    - TRAEFIK_ENTRYPOINTS_WEB_ADDRESS=:80
    - TRAEFIK_ENTRYPOINTS_WEBSECURE_ADDRESS=:443
  restart: unless-stopped
